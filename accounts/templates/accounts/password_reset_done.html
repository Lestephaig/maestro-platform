{% extends 'base.html' %}

{% block title %}Письмо отправлено - Maestro Platform{% endblock %}

{% block extra_css %}
<style>
    .reset-wrap {
        min-height: calc(100vh - 220px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
    }

    .reset-card {
        width: 100%;
        max-width: 620px;
        background: linear-gradient(135deg, var(--gray) 0%, var(--gray-dark) 100%);
        border: 1px solid var(--gold);
        border-radius: 18px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
        color: var(--white);
        text-align: center;
        padding: 2rem;
    }

    .reset-title {
        color: var(--gold-light);
        margin-bottom: 0.75rem;
        font-weight: 700;
    }

    .reset-text {
        color: var(--silver-light);
        margin: 0;
    }

    @media (max-width: 576px) {
        .reset-wrap {
            min-height: auto;
            padding: 1rem 0.75rem 2rem;
        }

        .reset-card {
            padding: 1.25rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="reset-wrap">
    <div class="reset-card">
        <h2 class="reset-title">Проверьте почту</h2>
        <p class="reset-text">
                Если аккаунт с таким email существует, мы отправили письмо со ссылкой для сброса пароля.
        </p>
    </div>
</div>
{% endblock %}
