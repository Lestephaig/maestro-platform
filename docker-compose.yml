version: '3.8'

services:
  db:
    image: postgres:15
    container_name: maestro_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: maestro_db
      POSTGRES_USER: maestro_user
      POSTGRES_PASSWORD: maestro_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maestro_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - maestro_network

  redis:
    image: redis:7
    container_name: maestro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - maestro_network

  web:
    build: .
    container_name: maestro_web
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - maestro_network

networks:
  maestro_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: